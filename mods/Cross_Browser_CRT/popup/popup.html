<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRT Mod</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1>CRT Mod</h1>
        <p class="subtitle">Cross-Browser Shader Effects</p>

        <div class="control-group">
            <label class="toggle">
                <input type="checkbox" id="shader-toggle">
                <span class="toggle-slider"></span>
                <span class="toggle-label">CRT Shader</span>
            </label>
        </div>

        <div class="control-group">
            <label class="select-label" for="shader-type">Shader Type</label>
            <select id="shader-type">
                <option value="crt">CRT (Flat)</option>
                <option value="crt_curved">CRT (Curved)</option>
            </select>
        </div>

        <div class="control-group">
            <label class="range-label" for="intensity-slider">
                Intensity: <span id="intensity-value">50%</span>
            </label>
            <input type="range" id="intensity-slider" min="0" max="100" value="50">
        </div>

        <div class="control-group">
            <label class="toggle">
                <input type="checkbox" id="sound-toggle">
                <span class="toggle-slider"></span>
                <span class="toggle-label">Keyboard Sounds</span>
            </label>
        </div>

        <div class="footer">
            <p>Works on Chrome, Firefox, Edge & Opera</p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
